<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CÓDIGOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.14.1/mqtt.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --disp:'Titan One',system-ui,cursive;
    --mag:#ff3df2; --mag-l:#ff7cf0; --mag-d:#8a0fa0;
    --pur:#9a5cff; --pur-d:#3f1499;
    --cyan:#37e6ff; --cyan-l:#8ff2ff; --cyan-d:#0a7f9e;
    --text:#f4ecff; --muted:#b6a6da;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Baloo 2',system-ui,sans-serif; color:var(--text);
    background:
      linear-gradient(118deg, transparent 45%, rgba(210,130,255,.10) 49%, rgba(255,255,255,.06) 50%, rgba(210,130,255,.08) 51%, transparent 56%),
      radial-gradient(130% 60% at 50% -6%, rgba(180,70,255,.55), transparent 60%),
      radial-gradient(90% 55% at 85% 108%, rgba(255,60,220,.28), transparent 60%),
      linear-gradient(180deg,#180b30 0%,#0d0720 50%,#070411 100%);
    background-attachment:fixed;
    min-height:100vh; min-height:100dvh;
    display:flex; justify-content:center; padding:12px; overscroll-behavior:none;
  }
  .app{width:100%; max-width:500px; margin:0 auto;}
  .card{
    background:linear-gradient(180deg,#1d1136 0%,#150b28 60%,#0f081f 100%);
    border-radius:26px; border:2px solid rgba(255,80,235,.55);
    box-shadow:
      0 0 0 2px rgba(120,40,255,.30),
      0 0 26px rgba(255,60,220,.38),
      0 0 66px rgba(140,60,255,.28),
      inset 0 2px 0 rgba(255,255,255,.08),
      inset 0 -8px 26px rgba(0,0,0,.55);
    padding:24px 20px;
    min-height:calc(100vh - 24px); min-height:calc(100dvh - 24px);
    display:flex; flex-direction:column; justify-content:center;
  }
  h1{
    font-family:var(--disp); font-size:50px; line-height:1;
    text-align:center; margin:2px 0 6px; color:#fff; letter-spacing:1px;
    -webkit-text-stroke:1.5px #2a0b3a;
    text-shadow:0 0 9px rgba(255,80,235,.95), 0 0 24px rgba(255,60,220,.75), 0 3px 0 rgba(0,0,0,.4);
  }
  h1 .em{color:var(--mag-l); text-shadow:0 0 12px rgba(255,90,236,1), 0 0 30px rgba(255,60,220,.85);}
  .subtitle{text-align:center;color:var(--muted);font-size:14px;margin:0 0 16px;font-weight:600;}
  .phase-title{font-family:var(--disp);font-size:26px;text-align:center;margin:0 0 6px;color:#fff;letter-spacing:.5px;text-shadow:0 0 10px rgba(255,80,235,.6),0 2px 0 rgba(0,0,0,.4);}
  .phase-sub{color:var(--muted);font-size:14.5px;text-align:center;margin:0 0 16px;line-height:1.5;font-weight:500;}
  .phase-sub b{color:var(--cyan-l);}

  .digits{display:flex;gap:12px;justify-content:center;margin:18px 0 6px;}
  .digit{
    width:62px;height:78px;border-radius:16px;
    background:linear-gradient(180deg,#160c2a,#1f1238);
    border:2px solid rgba(150,90,255,.4);
    box-shadow:inset 0 5px 12px rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--disp);font-size:38px;color:var(--cyan-l);
    text-shadow:0 0 10px rgba(55,230,255,.7);transition:.12s;
  }
  .digit.filled{border-color:var(--mag);box-shadow:inset 0 5px 12px rgba(0,0,0,.55),0 0 15px rgba(255,90,236,.5);}
  .digit.active{border-color:var(--cyan);box-shadow:inset 0 5px 12px rgba(0,0,0,.55),0 0 17px rgba(55,230,255,.7);}
  .digit.secret{color:#9a86c8;text-shadow:none;}

  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:20px 0 4px;}
  .key{
    font-family:var(--disp);font-size:25px;color:#f0e6ff;border:1.5px solid rgba(150,90,255,.4);
    border-radius:14px;padding:16px 0;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#2c1a48,#1f1338);
    box-shadow:0 4px 0 #130b26, inset 0 2px 0 rgba(255,255,255,.12);
    text-shadow:0 0 6px rgba(180,120,255,.5);transition:transform .06s,box-shadow .06s;
  }
  .key:active{transform:translateY(3px);box-shadow:0 1px 0 #130b26, inset 0 2px 0 rgba(255,255,255,.12);}
  .key.del{background:linear-gradient(180deg,#ff4d6d,#c81f45);border-color:rgba(255,150,170,.5);box-shadow:0 4px 0 #7f0f2a,0 0 14px rgba(255,60,110,.45), inset 0 2px 0 rgba(255,255,255,.3);color:#fff;}
  .key.del:active{box-shadow:0 1px 0 #7f0f2a, inset 0 2px 0 rgba(255,255,255,.3);}
  .key.ok{background:linear-gradient(180deg,#4ff0ff,#12a9d6);border-color:rgba(180,245,255,.6);box-shadow:0 4px 0 #0a7f9e,0 0 14px rgba(55,230,255,.45), inset 0 2px 0 rgba(255,255,255,.4);color:#04333f;}
  .key.ok:active{box-shadow:0 1px 0 #0a7f9e, inset 0 2px 0 rgba(255,255,255,.4);}

  .msg{min-height:20px;text-align:center;font-size:14px;margin:8px 0 0;color:#ff8fb0;font-weight:700;}

  .btn{
    font-family:var(--disp);letter-spacing:.5px;
    display:block;width:100%;border:1.5px solid rgba(200,150,255,.55);border-radius:16px;padding:15px 16px;font-size:20px;
    color:#fff;cursor:pointer;margin-top:14px;position:relative;
    background:linear-gradient(180deg,#9a5cff,#6a26e0);
    box-shadow:0 5px 0 var(--pur-d), 0 0 18px rgba(138,75,255,.6), inset 0 2px 0 rgba(255,255,255,.35);
    text-shadow:0 0 8px rgba(190,140,255,.7),0 2px 0 rgba(0,0,0,.3);transition:transform .06s,box-shadow .06s;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--pur-d),0 0 12px rgba(138,75,255,.5), inset 0 2px 0 rgba(255,255,255,.35);}
  .btn:disabled{opacity:.5;}
  .btn.green{background:linear-gradient(180deg,#ff5cf0,#c81fd8);border-color:rgba(255,180,250,.65);box-shadow:0 5px 0 var(--mag-d),0 0 24px rgba(255,60,220,.7), inset 0 2px 0 rgba(255,255,255,.4);text-shadow:0 0 8px rgba(255,150,240,.8),0 2px 0 rgba(0,0,0,.3);}
  .btn.green:active{box-shadow:0 1px 0 var(--mag-d),0 0 14px rgba(255,60,220,.55), inset 0 2px 0 rgba(255,255,255,.4);}
  .btn.gold{background:linear-gradient(180deg,#4ff0ff,#12a9d6);color:#04333f;border-color:rgba(180,245,255,.65);box-shadow:0 5px 0 var(--cyan-d),0 0 22px rgba(55,230,255,.65), inset 0 2px 0 rgba(255,255,255,.5);text-shadow:0 1px 0 rgba(255,255,255,.35);}
  .btn.gold:active{box-shadow:0 1px 0 var(--cyan-d),0 0 12px rgba(55,230,255,.5), inset 0 2px 0 rgba(255,255,255,.5);}
  .btn.secondary{background:linear-gradient(180deg,#2a1a44,#1d1233);color:#e7dcff;border:1.5px solid rgba(150,90,255,.45);box-shadow:0 5px 0 #120a22,0 0 14px rgba(120,50,220,.3), inset 0 2px 0 rgba(255,255,255,.08);text-shadow:none;}
  .btn.secondary:active{box-shadow:0 1px 0 #120a22, inset 0 2px 0 rgba(255,255,255,.08);}

  .field{
    width:100%;padding:14px 16px;font-size:18px;border-radius:14px;border:2px solid rgba(150,90,255,.4);
    background:linear-gradient(180deg,#160c2a,#1f1238);color:#fff;margin-bottom:4px;text-align:center;
    box-shadow:inset 0 4px 10px rgba(0,0,0,.55);font-family:'Baloo 2';font-weight:700;
  }
  .field:focus{outline:none;border-color:var(--mag);box-shadow:inset 0 4px 10px rgba(0,0,0,.55),0 0 14px rgba(255,90,236,.5);}
  .field.code{font-family:var(--disp);font-size:30px;letter-spacing:10px;color:var(--cyan-l);text-transform:uppercase;text-shadow:0 0 10px rgba(55,230,255,.6);}
  label.lbl{display:block;font-size:13px;color:var(--muted);margin:12px 2px 6px;text-align:center;font-weight:700;}

  .rules{
    background:linear-gradient(180deg,#1b1030,#150b26);border:1.5px solid rgba(150,90,255,.3);
    border-radius:16px;padding:15px 17px;font-size:14.5px;color:#cdbff0;line-height:1.65;
    box-shadow:inset 0 2px 8px rgba(0,0,0,.4);margin-bottom:4px;font-weight:500;
  }
  .rules b{color:var(--mag-l);font-weight:800;}

  .invite{
    background:linear-gradient(180deg,#ff5cf0,#c81fd8);color:#fff;border-radius:16px;
    padding:13px 16px;text-align:center;font-weight:800;margin-bottom:14px;
    box-shadow:0 5px 0 var(--mag-d),0 0 22px rgba(255,60,220,.55), inset 0 2px 0 rgba(255,255,255,.35);
  }
  .invite b{font-family:var(--disp);letter-spacing:4px;font-size:20px;}

  .status{display:flex;align-items:center;gap:7px;justify-content:center;font-size:12px;color:var(--muted);margin-top:14px;font-weight:600;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);}
  .dot.on{background:#57ff9e;box-shadow:0 0 8px #57ff9e;}
  .dot.off{background:#ff5d6d;}
  .dot.wait{background:var(--mag);box-shadow:0 0 8px var(--mag);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .codebox{
    text-align:center;border-radius:18px;padding:14px 16px;margin:14px 0;
    background:linear-gradient(180deg,#1a0f2e,#120922);border:2px dashed var(--mag);
    box-shadow:inset 0 3px 10px rgba(0,0,0,.5),0 0 20px rgba(255,90,236,.28);
  }
  .codebox .lab{font-size:12px;color:var(--cyan);text-transform:uppercase;letter-spacing:3px;font-weight:800;}
  .codebox .code{font-family:var(--disp);font-size:50px;letter-spacing:12px;color:#fff;text-shadow:0 0 14px rgba(255,90,236,.9),0 0 30px rgba(255,60,220,.6);}

  .turnbar{
    display:flex;align-items:center;justify-content:space-between;border-radius:16px;padding:12px 16px;
    margin-bottom:14px;background:linear-gradient(180deg,#1b1030,#150b26);
    box-shadow:inset 0 2px 7px rgba(0,0,0,.4);border:1.5px solid rgba(150,90,255,.3);
  }
  .turnbar .name{font-family:var(--disp);font-size:18px;color:var(--mag-l);text-shadow:0 0 8px rgba(255,90,236,.6);}
  .badge{font-family:var(--disp);font-size:13px;padding:6px 13px;border-radius:20px;letter-spacing:.5px;}
  .badge.you{background:linear-gradient(180deg,#4ff0ff,#12a9d6);color:#04333f;box-shadow:0 3px 0 var(--cyan-d),0 0 12px rgba(55,230,255,.5);}
  .badge.wait{background:linear-gradient(180deg,#b98bff,#8a4bff);color:#fff;box-shadow:0 3px 0 #4f22b0,0 0 12px rgba(150,90,255,.5);}

  .history{margin-top:16px;max-height:32vh;overflow-y:auto;}
  .history h3{font-family:var(--disp);font-size:13px;color:var(--muted);letter-spacing:1px;margin:0 0 9px;text-transform:uppercase;font-weight:400;}
  .hrow{display:flex;align-items:center;justify-content:space-between;border-radius:12px;padding:10px 13px;margin-bottom:8px;background:linear-gradient(180deg,#1b1030,#150b26);box-shadow:inset 0 1px 3px rgba(0,0,0,.4);}
  .hrow .g{font-family:var(--disp);font-size:22px;letter-spacing:6px;color:#fff;text-shadow:0 0 8px rgba(180,120,255,.5);}
  .hrow .hits{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px;font-weight:600;}
  .pill{font-family:var(--disp);border-radius:20px;padding:4px 12px;font-size:15px;background:#2a1a48;color:var(--mag-l);}
  .pill.win{background:linear-gradient(180deg,#4ff0ff,#12a9d6);color:#04333f;box-shadow:0 0 12px rgba(55,230,255,.5);}
  .pill.zero{color:#9a86c8;background:#211538;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:14px 0;font-weight:600;}

  .handoff{text-align:center;padding:10px 0;}
  .handoff .icon{margin-bottom:6px;}
  .handoff .who{font-family:var(--disp);color:var(--mag-l);font-size:28px;margin:6px 0 12px;text-shadow:0 0 12px rgba(255,90,236,.6);}

  .end{text-align:center;}
  .end .emoji{margin-bottom:6px;}
  .end .big{font-family:var(--disp);font-size:32px;margin:4px 0;}
  .end .win{color:var(--cyan-l);text-shadow:0 0 14px rgba(55,230,255,.8);}
  .end .lose{color:#ff5d6d;text-shadow:0 0 14px rgba(255,60,110,.7);}
  .reveal{border-radius:14px;padding:15px;margin:14px 0;color:#cdbff0;font-size:14px;line-height:1.9;background:linear-gradient(180deg,#1b1030,#150b26);box-shadow:inset 0 2px 6px rgba(0,0,0,.4);font-weight:500;}
  .reveal b{font-family:var(--disp);color:var(--cyan-l);font-size:23px;letter-spacing:4px;text-shadow:0 0 10px rgba(55,230,255,.6);}

  .flash-overlay{position:fixed;inset:0;background:var(--mag);opacity:0;pointer-events:none;z-index:999;transition:opacity .08s;}
  .flash-overlay.go{opacity:.8;}

  .toast{
    position:fixed;top:14px;left:50%;z-index:1000;transform:translateX(-50%) translateY(-220%);
    max-width:92%;width:max-content;padding:14px 20px;border-radius:16px;font-family:var(--disp);
    font-size:15px;line-height:1.3;text-align:center;color:#fff;pointer-events:none;
    box-shadow:0 16px 34px rgba(0,0,0,.5);transition:transform .38s cubic-bezier(.2,1.25,.3,1);
  }
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.warn{background:linear-gradient(180deg,#ff7cf0,#c81fd8);box-shadow:0 0 24px rgba(255,60,220,.6),0 14px 32px rgba(0,0,0,.5);}
  .toast.crit{background:linear-gradient(180deg,#ff5d6d,#d21f45);box-shadow:0 0 24px rgba(255,60,110,.6),0 14px 32px rgba(0,0,0,.5);}
  .toast.safe{background:linear-gradient(180deg,#4ff0ff,#12a9d6);color:#04333f;box-shadow:0 0 24px rgba(55,230,255,.6),0 14px 32px rgba(0,0,0,.5);}

  .lasthit{border-radius:12px;padding:10px 13px;margin-top:12px;font-size:13.5px;color:#cdbff0;background:linear-gradient(180deg,#1b1030,#150b26);box-shadow:inset 0 1px 3px rgba(0,0,0,.4);font-weight:600;}
  .lasthit b{font-family:var(--disp);color:var(--cyan-l);}

  .hint{font-size:12.5px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.5;font-weight:600;}
  .hint b{color:var(--cyan-l);font-family:var(--disp);letter-spacing:2px;}
  .fade{animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  a{color:var(--cyan);}
</style>
</head>
<body>
<div class="flash-overlay" id="flash"></div>
<div class="toast" id="toast"></div>
<div class="app"><div class="card fade" id="screen"></div></div>

<script>
"use strict";

// ================= Configuración de red =================
const BROKER = "wss://broker.emqx.io:8084/mqtt";
const BROKER_FALLBACK = "wss://broker.hivemq.com:8884/mqtt";
const TOPIC_ROOT = "adivinacifra/v2";

// Invitación por enlace (?sala=XXXX)
const INVITE = (()=>{ try{ const p=new URLSearchParams(location.search); return (p.get("sala")||"").toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,4); }catch(e){ return ""; } })();
function inviteUrl(code){ return location.origin + location.pathname + "?sala=" + code; }

// ================= Estado =================
const S = {
  name: "",
  cid: "c" + Math.floor(performance.now() * 1000 % 1e9) + "_" + (performance.now() | 0),
  role: null, room: null, secret: null, buffer: "", phase: "welcome",
  myTurn: false, guesses: [],
  opp: { name: null, ready: false, present: false },
  ready: false, client: null, connected: false, waitingResult: false,
  oppLastGuess: null, usedFallback: false
};

const screen = document.getElementById("screen");
const flash = document.getElementById("flash");

// ================= Lógica =================
function isValid(str){ return /^\d{4}$/.test(str) && new Set(str.split("")).size === 4; }
function exactHits(guess, secret){ let h=0; for(let i=0;i<4;i++) if(guess[i]===secret[i]) h++; return h; }
function randCode(){
  const A = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let c=""; for(let i=0;i<4;i++) c += A[Math.floor((performance.now()*7919*(i+3)) % A.length)];
  return c;
}

// ================= Audio + aviso =================
let audioCtx = null;
function unlockAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
    const b = audioCtx.createBuffer(1,1,22050);
    const s = audioCtx.createBufferSource(); s.buffer=b; s.connect(audioCtx.destination); s.start(0);
  }catch(e){}
}
function beep(freq, start, dur, vol){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
  o.type = "square"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, audioCtx.currentTime+start);
  g.gain.exponentialRampToValueAtTime(vol, audioCtx.currentTime+start+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+start+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(audioCtx.currentTime+start); o.stop(audioCtx.currentTime+start+dur+0.02);
}
function alertHit(hits, win){
  try{
    if(navigator.vibrate){
      if(win) navigator.vibrate([120,60,120,60,300]);
      else navigator.vibrate(Array(hits).fill(90).flatMap(v=>[v,70]));
    }
  }catch(e){}
  if(win){
    beep(660,0,.15,.5); beep(880,.18,.15,.5); beep(1046,.36,.3,.5);
    beep(660,.7,.15,.5); beep(1046,.9,.4,.5);
  } else {
    for(let i=0;i<hits;i++){ beep(720+i*120, i*0.22, .16, .5); }
  }
  let flashes = win ? 6 : hits, n=0;
  const doFlash = ()=>{
    flash.classList.add("go");
    setTimeout(()=>{ flash.classList.remove("go"); n++; if(n<flashes) setTimeout(doFlash,120); }, 120);
  };
  doFlash();
}
function showWarn(hits, oppName, win){
  const t = document.getElementById("toast");
  if(!t) return;
  let cls, icon, txt;
  if(win){ cls="crit"; icon="unlock"; txt=`¡${oppName} ha DESCUBIERTO tu cifra!`; }
  else if(hits===0){ cls="safe"; icon="shield"; txt=`${oppName} ha probado y ha fallado — 0 aciertos`; }
  else { cls = hits>=3 ? "crit" : "warn"; icon="warning"; txt = `¡Cuidado! ${oppName} ha acertado <span style="font-size:20px">${hits}</span> de 4 dígitos`; }
  t.className = "toast show " + cls;
  t.innerHTML = `<span style="display:inline-flex;align-items:center;gap:9px;justify-content:center">${ICON(icon,22)}<span>${txt}</span></span>`;
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.className = "toast"; }, win?4200:3800);
}
function miniToast(msg){
  const t = document.getElementById("toast");
  if(!t) return;
  t.className = "toast show safe";
  t.innerHTML = `<span style="display:inline-flex;align-items:center;gap:9px;justify-content:center">${ICON('check',20)}<span>${msg}</span></span>`;
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.className = "toast"; }, 2200);
}
async function shareInvite(code){
  const url = inviteUrl(code);
  const data = { title:"CÓDIGOS", text:`¡Te reto en CÓDIGOS! Entra a mi sala (${code}):`, url };
  try{ if(navigator.share){ await navigator.share(data); } else { copyText(url); } }
  catch(e){}
}
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>miniToast("Enlace copiado")).catch(()=>fallbackCopy(txt));
  } else { fallbackCopy(txt); }
}
function fallbackCopy(txt){
  try{
    const ta=document.createElement("textarea"); ta.value=txt;
    ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
    miniToast("Enlace copiado");
  }catch(e){ miniToast("Copia el enlace manualmente"); }
}

// ================= MQTT =================
function topics(room){ return { presence: TOPIC_ROOT + "/" + room + "/p/", events: TOPIC_ROOT + "/" + room + "/e" }; }
function connect(room, onReady){
  const t = topics(room);
  const willTopic = t.presence + S.cid;
  const url = S.usedFallback ? BROKER_FALLBACK : BROKER;
  const client = mqtt.connect(url, {
    clientId: "juego_" + S.cid, clean: true, reconnectPeriod: 2500,
    connectTimeout: 8000, keepalive: 30,
    will: { topic: willTopic, payload: "", qos:0, retain:true }
  });
  S.client = client;
  let firstConnect = true;
  client.on("connect", ()=>{
    S.connected = true;
    client.subscribe(t.presence + "+", {qos:0});
    client.subscribe(t.events, {qos:0});
    publishPresence();
    if(firstConnect){ firstConnect=false; onReady && onReady(); }
    refreshStatus();
  });
  client.on("reconnect", ()=>{ refreshStatus(); });
  client.on("close", ()=>{ S.connected=false; refreshStatus(); });
  client.on("error", ()=>{
    if(firstConnect && !S.usedFallback){
      S.usedFallback = true;
      try{ client.end(true); }catch(e){}
      connect(room, onReady);
    }
  });
  client.on("message", (topic, payload)=> handleMessage(topic, payload.toString(), t));
}
function publishPresence(){
  if(!S.client || !S.connected) return;
  const t = topics(S.room);
  const data = JSON.stringify({ cid:S.cid, name:S.name, role:S.role, ready:S.ready });
  S.client.publish(t.presence + S.cid, data, {qos:0, retain:true});
}
function sendEvent(obj){
  if(!S.client) return;
  const t = topics(S.room);
  obj.cid = S.cid;
  S.client.publish(t.events, JSON.stringify(obj), {qos:0, retain:false});
}
function clearPresence(){
  if(!S.client) return;
  const t = topics(S.room);
  S.client.publish(t.presence + S.cid, "", {qos:0, retain:true});
}
function handleMessage(topic, msg, t){
  if(topic.startsWith(t.presence)){
    const who = topic.slice(t.presence.length);
    if(who === S.cid) return;
    if(!msg){ if(S.opp.present){ S.opp.present=false; S.opp.ready=false; onOppLeft(); } return; }
    let d; try{ d=JSON.parse(msg); }catch(e){ return; }
    S.opp.name = d.name || "Rival"; S.opp.ready = !!d.ready; S.opp.present = true;
    onPresenceUpdate();
    return;
  }
  if(topic === t.events){
    let e; try{ e=JSON.parse(msg); }catch(err){ return; }
    if(e.cid === S.cid) return;
    onEvent(e);
  }
}

// ================= Presencia / eventos =================
function onPresenceUpdate(){
  if(S.phase === "lobby"){
    if(S.ready && S.opp.present && S.opp.ready){ startPlay(); } else drawLobby();
  } else if(S.phase === "create-wait"){
    if(S.opp.present){ goSecret(); }
  }
}
function onOppLeft(){
  if(S.phase === "play" || S.phase === "lobby"){
    showInfo("Tu rival se desconectó", "Esperando a que "+ (S.opp.name||"tu rival") +" vuelva a la sala… (deja esta pantalla abierta)");
    S.phase = "lobby-wait-back";
  }
}
function onEvent(e){
  if(e.t === "guess"){
    const hits = exactHits(e.value, S.secret);
    const win = hits === 4;
    sendEvent({ t:"result", value:e.value, hits, win });
    S.oppLastGuess = { value:e.value, hits };
    if(hits>0) alertHit(hits, win);
    showWarn(hits, S.opp.name || "Tu rival", win);
    if(win){ endGame(false); }
    else { S.myTurn = true; if(S.phase==="play") drawPlay(); }
  }
  else if(e.t === "result"){
    S.waitingResult = false;
    S.guesses.push({ guess:e.value, hits:e.hits });
    if(e.win){ endGame(true); }
    else { S.myTurn = false; if(S.phase==="play") drawPlay(); }
  }
  else if(e.t === "rematch"){
    if(S.phase==="end"){ doRematch(true); }
  }
}

// ================= Iconos (SVG propios) =================
function ICON(name, size, color){
  size = size || 24; color = color || "currentColor";
  const head = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex:none"`;
  const P = {
    dice:`<rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8" cy="8" r="1.35" fill="${color}" stroke="none"/><circle cx="16" cy="8" r="1.35" fill="${color}" stroke="none"/><circle cx="12" cy="12" r="1.35" fill="${color}" stroke="none"/><circle cx="8" cy="16" r="1.35" fill="${color}" stroke="none"/><circle cx="16" cy="16" r="1.35" fill="${color}" stroke="none"/>`,
    key:`<circle cx="8" cy="15" r="4"/><path d="M10.9 12.1 20 3M15.5 4.5l3 3M13.5 6.5l2.5 2.5"/>`,
    hourglass:`<path d="M6 3h12M6 21h12"/><path d="M7.5 3c0 4.5 9 6 9 0M7.5 21c0-4.5 9-6 9 0"/>`,
    signal:`<circle cx="12" cy="12" r="2" fill="${color}" stroke="none"/><path d="M7.6 7.6a6 6 0 000 8.8M16.4 7.6a6 6 0 010 8.8M4.8 4.8a10 10 0 000 14.4M19.2 4.8a10 10 0 010 14.4"/>`,
    clock:`<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/>`,
    warning:`<path d="M12 3.6 21.4 20H2.6z"/><path d="M12 10v4.2M12 17.4h.01"/>`,
    trophy:`<path d="M7 4h10v3.2a5 5 0 01-10 0z"/><path d="M7 5H4v1.2a3 3 0 003 3M17 5h3v1.2a3 3 0 01-3 3"/><path d="M12 12.2v3.8M8.5 20h7M9.6 16h4.8"/>`,
    unlock:`<rect x="4.5" y="11" width="15" height="9.5" rx="2"/><path d="M8 11V7a4 4 0 017.7-1.6"/><circle cx="12" cy="15.6" r="1.4" fill="${color}" stroke="none"/>`,
    lock:`<rect x="4.5" y="11" width="15" height="9.5" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/><circle cx="12" cy="15.6" r="1.4" fill="${color}" stroke="none"/>`,
    shield:`<path d="M12 3l7.5 3v5c0 5.2-3.3 7.4-7.5 8.4C7.8 18.4 4.5 16.2 4.5 11V6z"/><path d="M8.8 12l2.2 2.2 4.4-4.6"/>`,
    target:`<circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3.2"/><path d="M12 1.5v3M12 19.5v3M1.5 12h3M19.5 12h3"/>`,
    check:`<path d="M4 12.5l5 5L20 6"/>`,
    back:`<path d="M9 5h9a2 2 0 012 2v10a2 2 0 01-2 2H9l-6-7z"/><path d="M13 9.5l4 4M17 9.5l-4 4"/>`,
    share:`<circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="M8.3 10.8l7.4-4.3M8.3 13.2l7.4 4.3"/>`,
    link:`<path d="M9 15l6-6"/><path d="M10.5 6.5l1.2-1.2a4 4 0 015.7 5.7l-2.2 2.2"/><path d="M13.5 17.5l-1.2 1.2a4 4 0 01-5.7-5.7l2.2-2.2"/>`
  };
  return `<svg ${head}>${P[name]||""}</svg>`;
}
function iconLabel(name, text){
  return `<span style="display:inline-flex;align-items:center;gap:10px;justify-content:center">${ICON(name,22)}<span>${text}</span></span>`;
}

// ================= Utilidades UI =================
function digitsRow(value, secret){
  let html='<div class="digits">';
  for(let i=0;i<4;i++){
    const has=i<value.length; let cls="digit";
    if(has) cls+=" filled";
    if(i===value.length) cls+=" active";
    let ch = has ? (secret ? "•" : value[i]) : "";
    html+=`<div class="${cls}${secret?' secret':''}">${ch}</div>`;
  }
  return html+'</div>';
}
function keypad(){
  let h='<div class="keypad">';
  for(let n=1;n<=9;n++) h+=`<button class="key" data-n="${n}">${n}</button>`;
  h+=`<button class="key del" data-act="del">${ICON('back',24)}</button>`;
  h+=`<button class="key" data-n="0">0</button>`;
  h+=`<button class="key ok" data-act="ok">${ICON('check',24)}</button>`;
  return h+'</div>';
}
function statusBar(){
  let dot="off", txt="Sin conexión";
  if(S.connected){
    if(S.opp.present){ dot="on"; txt="Conectado con "+(S.opp.name||"rival"); }
    else { dot="wait"; txt="Conectado — esperando rival"; }
  } else { dot="wait"; txt="Conectando…"; }
  return `<div class="status"><span class="dot ${dot}"></span><span id="stxt">${txt}</span></div>`;
}
function refreshStatus(){
  const el = document.getElementById("stxt");
  if(!el) return;
  const dot = el.parentElement.querySelector(".dot");
  let cls="off", txt="Sin conexión";
  if(S.connected){
    if(S.opp.present){ cls="on"; txt="Conectado con "+(S.opp.name||"rival"); }
    else { cls="wait"; txt="Conectado — esperando rival"; }
  } else { cls="wait"; txt="Conectando…"; }
  dot.className = "dot "+cls; el.textContent = txt;
}
function render(html){
  screen.classList.remove("fade"); void screen.offsetWidth;
  screen.innerHTML = html; screen.classList.add("fade");
}
function bindKeypad(redraw, onOk){
  screen.querySelectorAll(".key").forEach(k=>{
    k.onclick = ()=>{
      const act=k.dataset.act;
      if(act==="del"){ S.buffer=S.buffer.slice(0,-1); redraw(); }
      else if(act==="ok"){ onOk(); }
      else if(S.buffer.length<4){ S.buffer+=k.dataset.n; redraw(); }
    };
  });
}

// ================= Pantallas =================
function showWelcome(){
  S.phase="welcome";
  const inviteBanner = INVITE ? `<div class="invite">Te han invitado a la sala <b>${INVITE}</b></div>` : "";
  render(`
    <div style="text-align:center;margin-bottom:2px">${ICON('target',52,'#ff5cec')}</div>
    <h1>CÓ<span class="em">DIGOS</span></h1>
    <p class="subtitle">Duelo online · dos jugadores, dos móviles</p>
    ${inviteBanner}
    <div class="rules">
      Cada uno elige en secreto una cifra de <b>4 dígitos sin repetir</b>. Por turnos
      intentáis adivinar la del rival. La única pista: <b>cuántos dígitos acertaste en su
      posición exacta</b>. Cuando aciertas, el <b>móvil del rival suena y destella</b>.
      <b>Gana quien descubra primero la cifra del otro.</b>
    </div>
    <button class="btn green" id="go">${INVITE ? "Entrar a la sala" : "Jugar"}</button>
  `);
  document.getElementById("go").onclick = ()=>{ unlockAudio(); showName(); };
}

function showName(){
  S.phase="name";
  render(`
    <h2 class="phase-title">¿Cómo te llamas?</h2>
    <p class="phase-sub">Tu rival verá este nombre.</p>
    <input class="field" id="nm" maxlength="14" placeholder="Tu nombre" value="${S.name}">
    <button class="btn" id="go">Continuar</button>
  `);
  const nm=document.getElementById("nm"); nm.focus();
  document.getElementById("go").onclick=()=>{
    S.name = (nm.value.trim() || "Jugador");
    if(INVITE){ joinRoom(INVITE); } else { showRoom(); }
  };
}

function showRoom(){
  S.phase="room";
  render(`
    <h2 class="phase-title">Sala de juego</h2>
    <p class="phase-sub">Crea una sala e invita a tu rival, o únete con un código.</p>
    <button class="btn gold" id="create">${iconLabel('dice','Crear una sala')}</button>
    <button class="btn secondary" id="join">${iconLabel('key','Unirme con un código')}</button>
  `);
  document.getElementById("create").onclick=()=>{ unlockAudio(); createRoom(); };
  document.getElementById("join").onclick=()=>{ unlockAudio(); joinScreen(); };
}

function createRoom(){
  S.role="host"; S.room=randCode(); S.ready=false; S.opp={name:null,ready:false,present:false};
  S.phase="create-wait";
  drawCreateWait();
  connect(S.room, ()=>{ refreshStatus(); });
}
function drawCreateWait(){
  const url = inviteUrl(S.room);
  render(`
    <h2 class="phase-title">¡Sala creada!</h2>
    <p class="phase-sub">Invita a tu rival — no tendrá que escribir el código.</p>
    <div class="codebox"><div class="lab">Código de sala</div><div class="code">${S.room}</div></div>
    <button class="btn green" id="share">${iconLabel('share','Enviar invitación')}</button>
    <button class="btn secondary" id="copy">${iconLabel('link','Copiar enlace')}</button>
    <p class="hint">O dile el código <b>${S.room}</b> para que lo escriba a mano.</p>
    ${statusBar()}
    <button class="btn secondary" id="cancel">Salir</button>
  `);
  document.getElementById("share").onclick=()=>shareInvite(S.room);
  document.getElementById("copy").onclick=()=>copyText(url);
  document.getElementById("cancel").onclick=leaveToMenu;
  refreshStatus();
}

function joinScreen(){
  S.phase="join";
  render(`
    <h2 class="phase-title">Unirse a una sala</h2>
    <p class="phase-sub">Escribe el código que te pasó tu rival.</p>
    <input class="field code" id="cd" maxlength="4" placeholder="----" autocapitalize="characters" autocomplete="off">
    <p class="msg" id="msg"></p>
    <button class="btn green" id="go">Entrar</button>
    <button class="btn secondary" id="back">Atrás</button>
  `);
  const cd=document.getElementById("cd"); cd.focus();
  cd.addEventListener("input",()=>{ cd.value=cd.value.toUpperCase().replace(/[^A-Z0-9]/g,""); });
  document.getElementById("go").onclick=()=>{
    const code=cd.value.trim().toUpperCase();
    if(code.length<4){ document.getElementById("msg").textContent="El código tiene 4 caracteres."; return; }
    joinRoom(code);
  };
  document.getElementById("back").onclick=showRoom;
}

function joinRoom(code){
  S.role="guest"; S.room=code; S.ready=false; S.opp={name:null,ready:false,present:false};
  connect(S.room, ()=>{});
  goSecret();
}

function goSecret(){ S.phase="secret"; S.buffer=""; drawSecret(); }
function drawSecret(){
  render(`
    <h2 class="phase-title">Tu cifra secreta</h2>
    <p class="phase-sub">Elige 4 dígitos <b>sin repetir</b>. El rival no la verá.</p>
    ${digitsRow(S.buffer)}
    <p class="msg" id="msg"></p>
    ${keypad()}
    ${statusBar()}
  `);
  refreshStatus();
  bindKeypad(drawSecret, submitSecret);
}
function submitSecret(){
  const msg=document.getElementById("msg");
  if(S.buffer.length<4){ msg.textContent="Faltan dígitos."; return; }
  if(!isValid(S.buffer)){ msg.textContent="Los 4 dígitos deben ser distintos."; return; }
  S.secret=S.buffer; S.buffer=""; S.ready=true;
  publishPresence();
  S.phase="lobby";
  drawLobby();
  onPresenceUpdate();
}
function drawLobby(){
  const oppTxt = S.opp.present
    ? (S.opp.ready ? `${S.opp.name} está listo ${ICON('check',16,'#57ff9e')}` : `${S.opp.name} está eligiendo su cifra…`)
    : `Esperando a que tu rival entre y elija su cifra…`;
  render(`
    <div class="handoff">
      <div class="icon">${ICON('hourglass',54,'#c98bff')}</div>
      <div class="phase-title">¡Listo!</div>
      <p class="phase-sub">Tu cifra está guardada.<br>${oppTxt}</p>
    </div>
    ${statusBar()}
    <button class="btn secondary" id="cancel">Salir</button>
  `);
  refreshStatus();
  document.getElementById("cancel").onclick=leaveToMenu;
}

function startPlay(){
  S.phase="play"; S.buffer="";
  S.myTurn = (S.role==="host");
  drawPlay();
}
function drawPlay(){
  const hist = S.guesses;
  let historyHtml = hist.length===0
    ? `<div class="empty">Aún no has hecho intentos.</div>`
    : hist.slice().reverse().map(h=>`
        <div class="hrow">
          <span class="g">${h.guess}</span>
          <span class="hits">aciertos <span class="pill ${h.hits===4?'win':(h.hits===0?'zero':'')}">${h.hits}/4</span></span>
        </div>`).join("");

  let center;
  if(S.myTurn){
    center = `
      <p class="phase-sub" style="margin-bottom:4px">Intento #${hist.length+1} — adivina la cifra de <b>${S.opp.name||"tu rival"}</b></p>
      ${digitsRow(S.buffer)}
      <p class="msg" id="msg"></p>
      ${keypad()}`;
  } else if(S.waitingResult){
    center = `<div class="handoff"><div class="icon">${ICON('signal',52,'#9a6bff')}</div><p class="phase-sub">Enviando tu intento…</p></div>`;
  } else {
    const last = S.oppLastGuess
      ? `<div class="lasthit">Su último intento acertó <b>${S.oppLastGuess.hits}/4</b> de tus dígitos</div>`
      : "";
    center = `<div class="handoff"><div class="icon">${ICON('clock',52,'#c98bff')}</div><p class="phase-sub">Turno de <b>${S.opp.name||"tu rival"}</b>.<br>Está intentando adivinar tu cifra…</p>${last}</div>`;
  }

  render(`
    <div class="turnbar">
      <span class="name">${S.name}</span>
      <span class="badge ${S.myTurn?'you':'wait'}">${S.myTurn?'TU TURNO':'ESPERA'}</span>
    </div>
    ${center}
    <div class="history">
      <h3>Tus intentos (${hist.length})</h3>
      ${historyHtml}
    </div>
    ${statusBar()}
  `);
  refreshStatus();
  if(S.myTurn) bindKeypad(drawPlay, submitGuess);
}
function submitGuess(){
  const msg=document.getElementById("msg");
  if(S.buffer.length<4){ msg.textContent="Faltan dígitos."; return; }
  if(!isValid(S.buffer)){ msg.textContent="Los 4 dígitos deben ser distintos."; return; }
  const value=S.buffer; S.buffer="";
  S.waitingResult=true; S.myTurn=false;
  sendEvent({ t:"guess", value });
  drawPlay();
}

function endGame(won){ S.phase="end"; S.won=won; drawEnd(); }
function drawEnd(){
  const won=S.won;
  render(`
    <div class="end">
      <div class="emoji">${won?ICON('trophy',66,'#4ff0ff'):ICON('unlock',66,'#ff5d6d')}</div>
      <div class="big ${won?'win':'lose'}">${won?"¡Ganaste!":"Te descubrieron"}</div>
      <p class="phase-sub">${won
        ? `Adivinaste la cifra de ${S.opp.name||"tu rival"} en ${S.guesses.length} ${S.guesses.length===1?'intento':'intentos'}.`
        : `${S.opp.name||"Tu rival"} descubrió tu cifra primero.`}</p>
      <div class="reveal">Tu cifra era: <b>${S.secret}</b></div>
      <button class="btn gold" id="again">Revancha</button>
      <button class="btn secondary" id="menu">Salir</button>
    </div>
    ${statusBar()}
  `);
  refreshStatus();
  document.getElementById("again").onclick=()=>{ sendEvent({t:"rematch"}); doRematch(false); };
  document.getElementById("menu").onclick=leaveToMenu;
}
function doRematch(fromOpponent){
  S.secret=null; S.buffer=""; S.guesses=[]; S.ready=false; S.won=false;
  S.waitingResult=false; S.myTurn=false; S.oppLastGuess=null;
  S.opp.ready=false;
  publishPresence();
  goSecret();
}

function showInfo(title, sub){
  render(`
    <div class="handoff">
      <div class="icon">${ICON('warning',52,'#ffcf5c')}</div>
      <div class="phase-title">${title}</div>
      <p class="phase-sub">${sub}</p>
    </div>
    ${statusBar()}
    <button class="btn secondary" id="menu">Salir al menú</button>
  `);
  refreshStatus();
  document.getElementById("menu").onclick=leaveToMenu;
}

function leaveToMenu(){
  try{ clearPresence(); }catch(e){}
  try{ if(S.client) S.client.end(true); }catch(e){}
  S.client=null; S.connected=false; S.role=null; S.room=null; S.secret=null;
  S.buffer=""; S.guesses=[]; S.ready=false; S.opp={name:null,ready:false,present:false};
  S.waitingResult=false; S.myTurn=false; S.oppLastGuess=null;
  showRoom();
}

window.addEventListener("beforeunload", ()=>{ try{ clearPresence(); }catch(e){} });

document.addEventListener("keydown",(e)=>{
  if(S.phase!=="secret" && !(S.phase==="play" && S.myTurn)) return;
  if(/^[0-9]$/.test(e.key)){ if(S.buffer.length<4){ S.buffer+=e.key; S.phase==="secret"?drawSecret():drawPlay(); } }
  else if(e.key==="Backspace"){ S.buffer=S.buffer.slice(0,-1); S.phase==="secret"?drawSecret():drawPlay(); }
  else if(e.key==="Enter"){ S.phase==="secret"?submitSecret():submitGuess(); }
});

showWelcome();
</script>
