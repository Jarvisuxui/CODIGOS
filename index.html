<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CÓDIGOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.14.1/mqtt.min.js"></script>
<style>
  :root{
    --disp:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,"Helvetica Neue",Arial,sans-serif;
    --accent:#007AFF; --accent-press:#0067d6;
    --bg:#f2f2f7; --card:#ffffff;
    --label:#1c1c1e; --label2:#6b6b70; --label3:#8e8e93;
    --sep:rgba(60,60,67,.12); --fill:#f2f2f7; --fill2:#e9e9ee;
    --green:#34c759; --red:#ff3b30; --orange:#ff9f0a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--disp); color:var(--label);
    background:
      radial-gradient(120% 50% at 50% -10%, rgba(0,122,255,.06), transparent 60%),
      linear-gradient(180deg,#f7f7fb 0%, #eef0f5 100%);
    background-attachment:fixed;
    min-height:100vh; min-height:100dvh;
    display:flex; justify-content:center; padding:12px; overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;
  }
  .app{width:100%; max-width:480px; margin:0 auto;}
  .card{
    background:var(--card);
    border-radius:28px; border:0.5px solid rgba(0,0,0,.06);
    box-shadow:0 1px 1px rgba(0,0,0,.03), 0 12px 34px rgba(0,0,0,.08), 0 3px 10px rgba(0,0,0,.04);
    padding:26px 22px;
    min-height:calc(100vh - 24px); min-height:calc(100dvh - 24px);
    display:flex; flex-direction:column; justify-content:center;
  }
  h1{
    font-family:var(--disp); font-weight:800; font-size:44px; line-height:1.02;
    text-align:center; margin:2px 0 4px; color:var(--label); letter-spacing:-.02em;
  }
  h1 .em{color:var(--label);}
  h1 .ch{display:inline-block;min-width:.58em;text-align:center;}
  h1 .ch.num{color:var(--accent);}
  h1 .ch.lock{color:var(--label);}
  h1 .ch.lock.isem{color:var(--label);}
  h1 .ch.pop{animation:chpop .22s ease;}
  @keyframes chpop{0%{transform:translateY(-4px) scale(1.18);}60%{transform:translateY(0) scale(.98);}100%{transform:none;}}
  .subtitle{text-align:center;color:var(--label3);font-size:15px;margin:0 0 20px;font-weight:500;letter-spacing:-.01em;}
  .phase-title{font-family:var(--disp);font-weight:700;font-size:26px;text-align:center;margin:0 0 6px;color:var(--label);letter-spacing:-.02em;}
  .phase-sub{color:var(--label3);font-size:15px;text-align:center;margin:0 0 20px;line-height:1.45;font-weight:400;}
  .phase-sub b{color:var(--label);font-weight:600;}

  .digits{display:flex;gap:12px;justify-content:center;margin:20px 0 6px;}
  .digit{
    width:62px;height:78px;border-radius:18px;
    background:var(--fill);
    border:1px solid rgba(0,0,0,.05);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--disp);font-weight:600;font-size:38px;color:var(--label);
    transition:.16s ease; font-variant-numeric:tabular-nums;
  }
  .digit.filled{background:#fff;border-color:rgba(0,0,0,.08);box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .digit.active{border-color:var(--accent);box-shadow:0 0 0 3.5px rgba(0,122,255,.18);}
  .digit.secret{color:var(--label3);}

  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:22px 0 4px;}
  .key{
    font-family:var(--disp);font-weight:500;font-size:26px;color:var(--label);border:0.5px solid rgba(0,0,0,.06);
    border-radius:16px;padding:16px 0;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center;
    background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.05); transition:background .12s, transform .06s;
    font-variant-numeric:tabular-nums;
  }
  .key:active{transform:scale(.96);background:var(--fill2);}
  .key.del{background:var(--fill);color:var(--label3);border-color:transparent;box-shadow:none;}
  .key.del:active{background:var(--fill2);}
  .key.ok{background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,122,255,.3);}
  .key.ok:active{background:var(--accent-press);}

  .msg{min-height:20px;text-align:center;font-size:14px;margin:8px 0 0;color:var(--red);font-weight:500;}

  .btn{
    font-family:var(--disp);font-weight:600;letter-spacing:-.01em;
    display:block;width:100%;border:none;border-radius:15px;padding:15px 16px;font-size:18px;
    color:#fff;cursor:pointer;margin-top:12px;
    background:var(--accent); box-shadow:0 2px 10px rgba(0,122,255,.22);
    transition:transform .06s, background .12s, box-shadow .12s;
  }
  .btn:active{transform:scale(.985);background:var(--accent-press);}
  .btn:disabled{opacity:.4;}
  .btn.green{background:var(--accent);box-shadow:0 2px 10px rgba(0,122,255,.22);}
  .btn.green:active{background:var(--accent-press);}
  .btn.gold{background:var(--accent);box-shadow:0 2px 10px rgba(0,122,255,.22);}
  .btn.gold:active{background:var(--accent-press);}
  .btn.secondary{background:rgba(0,122,255,.10);color:var(--accent);box-shadow:none;}
  .btn.secondary:active{background:rgba(0,122,255,.18);}

  .field{
    width:100%;padding:14px 16px;font-size:17px;border-radius:14px;border:1px solid rgba(0,0,0,.08);
    background:var(--fill);color:var(--label);margin-bottom:4px;text-align:center;
    font-family:var(--disp);font-weight:500;
  }
  .field:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3.5px rgba(0,122,255,.15);}
  .field.code{font-weight:700;font-size:28px;letter-spacing:8px;color:var(--label);text-transform:uppercase;font-variant-numeric:tabular-nums;}
  label.lbl{display:block;font-size:13px;color:var(--label3);margin:12px 2px 6px;text-align:center;font-weight:500;}

  .rules{
    background:var(--fill);border:0.5px solid rgba(0,0,0,.04);
    border-radius:16px;padding:16px 18px;font-size:15px;color:var(--label2);line-height:1.55;
    margin-bottom:4px;font-weight:400;
  }
  .rules b{color:var(--label);font-weight:600;}

  .invite{
    background:rgba(0,122,255,.10);color:var(--accent);border-radius:16px;
    padding:14px 16px;text-align:center;font-weight:600;margin-bottom:16px;font-size:15px;
  }
  .invite b{font-weight:800;letter-spacing:3px;font-size:19px;color:var(--accent);}

  .status{display:flex;align-items:center;gap:7px;justify-content:center;font-size:13px;color:var(--label3);margin-top:16px;font-weight:500;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--label3);}
  .dot.on{background:var(--green);}
  .dot.off{background:var(--red);}
  .dot.wait{background:var(--orange);animation:pulse 1.1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  .codebox{
    text-align:center;border-radius:18px;padding:16px;margin:16px 0;
    background:rgba(0,122,255,.08);border:0.5px solid rgba(0,122,255,.14);
  }
  .codebox .lab{font-size:12px;color:var(--label3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}
  .codebox .code{font-family:var(--disp);font-weight:700;font-size:48px;letter-spacing:10px;color:var(--accent);margin-top:2px;font-variant-numeric:tabular-nums;}

  .turnbar{
    display:flex;align-items:center;justify-content:space-between;border-radius:16px;padding:13px 16px;
    margin-bottom:14px;background:var(--fill);border:0.5px solid rgba(0,0,0,.04);
  }
  .turnbar .name{font-family:var(--disp);font-weight:700;font-size:17px;color:var(--label);letter-spacing:-.01em;}
  .badge{font-family:var(--disp);font-weight:600;font-size:12px;padding:6px 12px;border-radius:20px;letter-spacing:.2px;}
  .badge.you{background:var(--accent);color:#fff;}
  .badge.wait{background:var(--fill2);color:var(--label3);}

  .history{margin-top:16px;max-height:32vh;overflow-y:auto;}
  .history h3{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--label3);letter-spacing:.2px;margin:0 0 9px;text-transform:uppercase;}
  .hrow{display:flex;align-items:center;justify-content:space-between;border-radius:14px;padding:12px 14px;margin-bottom:8px;background:var(--fill);}
  .hrow .g{font-family:var(--disp);font-weight:600;font-size:22px;letter-spacing:4px;color:var(--label);font-variant-numeric:tabular-nums;}
  .hrow .hits{font-size:13px;color:var(--label3);display:flex;align-items:center;gap:7px;font-weight:400;}
  .pill{font-family:var(--disp);font-weight:600;border-radius:20px;padding:4px 11px;font-size:14px;background:#fff;color:var(--label);border:0.5px solid rgba(0,0,0,.06);}
  .pill.win{background:var(--green);color:#fff;border-color:transparent;}
  .pill.zero{color:var(--label3);background:var(--fill2);}
  .empty{color:var(--label3);font-size:14px;text-align:center;padding:16px 0;font-weight:400;}

  .handoff{text-align:center;padding:12px 0;}
  .handoff .icon{margin-bottom:8px;}
  .handoff .who{font-family:var(--disp);font-weight:700;color:var(--accent);font-size:27px;margin:6px 0 12px;letter-spacing:-.02em;}

  .end{text-align:center;}
  .end .emoji{margin-bottom:8px;}
  .end .big{font-family:var(--disp);font-weight:800;font-size:32px;margin:4px 0;letter-spacing:-.02em;}
  .end .win{color:var(--green);}
  .end .lose{color:var(--red);}
  .reveal{border-radius:16px;padding:16px;margin:16px 0;color:var(--label2);font-size:15px;line-height:1.8;background:var(--fill);font-weight:400;}
  .reveal b{font-family:var(--disp);font-weight:700;color:var(--label);font-size:22px;letter-spacing:3px;font-variant-numeric:tabular-nums;}

  .flash-overlay{position:fixed;inset:0;background:var(--red);opacity:0;pointer-events:none;z-index:999;transition:opacity .1s;}
  .flash-overlay.go{opacity:.28;}

  .toast{
    position:fixed;top:14px;left:50%;z-index:1000;transform:translateX(-50%) translateY(-220%);
    max-width:92%;width:max-content;padding:13px 18px;border-radius:16px;font-family:var(--disp);font-weight:600;
    font-size:15px;line-height:1.3;text-align:center;color:var(--label);pointer-events:none;
    background:rgba(255,255,255,.82);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
    border:0.5px solid rgba(0,0,0,.06);
    box-shadow:0 10px 30px rgba(0,0,0,.16);transition:transform .38s cubic-bezier(.2,1.1,.3,1);
  }
  .toast.show{transform:translateX(-50%) translateY(0);}

  .lasthit{border-radius:14px;padding:11px 14px;margin-top:12px;font-size:14px;color:var(--label2);background:var(--fill);font-weight:400;}
  .lasthit b{font-family:var(--disp);font-weight:700;color:var(--accent);}

  .hint{font-size:13px;color:var(--label3);text-align:center;margin-top:14px;line-height:1.5;font-weight:400;}
  .hint b{color:var(--accent);font-weight:700;letter-spacing:1.5px;}
  .fade{animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  a{color:var(--accent);}
</style>
</head>
<body>
<div class="flash-overlay" id="flash"></div>
<div class="toast" id="toast"></div>
<div class="app"><div class="card fade" id="screen"></div></div>

<script>
"use strict";

// ================= Configuración de red =================
const BROKER = "wss://broker.emqx.io:8084/mqtt";
const BROKER_FALLBACK = "wss://broker.hivemq.com:8884/mqtt";
const TOPIC_ROOT = "adivinacifra/v2";

// Invitación por enlace (?sala=XXXX)
const INVITE = (()=>{ try{ const p=new URLSearchParams(location.search); return (p.get("sala")||"").toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,4); }catch(e){ return ""; } })();
function inviteUrl(code){ return location.origin + location.pathname + "?sala=" + code; }

// ================= Estado =================
const S = {
  name: "",
  cid: "c" + Math.floor(performance.now() * 1000 % 1e9) + "_" + (performance.now() | 0),
  role: null, room: null, secret: null, buffer: "", phase: "welcome",
  myTurn: false, guesses: [],
  opp: { name: null, ready: false, present: false },
  ready: false, client: null, connected: false, waitingResult: false,
  oppLastGuess: null, usedFallback: false, oppEverPresent: false
};

const screen = document.getElementById("screen");
const flash = document.getElementById("flash");

// ================= Lógica =================
function isValid(str){ return /^\d{4}$/.test(str) && new Set(str.split("")).size === 4; }
function exactHits(guess, secret){ let h=0; for(let i=0;i<4;i++) if(guess[i]===secret[i]) h++; return h; }
function randCode(){
  const A = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let c=""; for(let i=0;i<4;i++) c += A[Math.floor((performance.now()*7919*(i+3)) % A.length)];
  return c;
}

// ================= Audio + aviso =================
let audioCtx = null;
function unlockAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
    const b = audioCtx.createBuffer(1,1,22050);
    const s = audioCtx.createBufferSource(); s.buffer=b; s.connect(audioCtx.destination); s.start(0);
  }catch(e){}
}
function beep(freq, start, dur, vol){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
  o.type = "square"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, audioCtx.currentTime+start);
  g.gain.exponentialRampToValueAtTime(vol, audioCtx.currentTime+start+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+start+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(audioCtx.currentTime+start); o.stop(audioCtx.currentTime+start+dur+0.02);
}
function alertHit(hits, win){
  try{
    if(navigator.vibrate){
      if(win) navigator.vibrate([120,60,120,60,300]);
      else navigator.vibrate(Array(hits).fill(90).flatMap(v=>[v,70]));
    }
  }catch(e){}
  if(win){
    beep(660,0,.15,.5); beep(880,.18,.15,.5); beep(1046,.36,.3,.5);
    beep(660,.7,.15,.5); beep(1046,.9,.4,.5);
  } else {
    for(let i=0;i<hits;i++){ beep(720+i*120, i*0.22, .16, .5); }
  }
  let flashes = win ? 6 : hits, n=0;
  const doFlash = ()=>{
    flash.classList.add("go");
    setTimeout(()=>{ flash.classList.remove("go"); n++; if(n<flashes) setTimeout(doFlash,120); }, 120);
  };
  doFlash();
}
function showWarn(hits, oppName, win){
  const t = document.getElementById("toast");
  if(!t) return;
  let cls, icon, txt;
  if(win){ cls="crit"; icon="unlock"; txt=`¡${oppName} ha DESCUBIERTO tu cifra!`; }
  else if(hits===0){ cls="safe"; icon="shield"; txt=`${oppName} ha probado y ha fallado — 0 aciertos`; }
  else { cls = hits>=3 ? "crit" : "warn"; icon="warning"; txt = `¡Cuidado! ${oppName} ha acertado <span style="font-size:20px">${hits}</span> de 4 dígitos`; }
  const col = cls==="crit" ? "#ff3b30" : (cls==="warn" ? "#ff9f0a" : "#34c759");
  t.className = "toast show " + cls;
  t.innerHTML = `<span style="display:inline-flex;align-items:center;gap:9px;justify-content:center">${ICON(icon,22,col)}<span>${txt}</span></span>`;
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.className = "toast"; }, win?4200:3800);
}
function miniToast(msg){
  const t = document.getElementById("toast");
  if(!t) return;
  t.className = "toast show safe";
  t.innerHTML = `<span style="display:inline-flex;align-items:center;gap:9px;justify-content:center">${ICON('check',20,'#34c759')}<span>${msg}</span></span>`;
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.className = "toast"; }, 2200);
}
async function shareInvite(code){
  const url = inviteUrl(code);
  const data = { title:"CÓDIGOS", text:`¡Te reto en CÓDIGOS! Entra a mi sala (${code}):`, url };
  try{ if(navigator.share){ await navigator.share(data); } else { copyText(url); } }
  catch(e){}
}
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>miniToast("Enlace copiado")).catch(()=>fallbackCopy(txt));
  } else { fallbackCopy(txt); }
}
function fallbackCopy(txt){
  try{
    const ta=document.createElement("textarea"); ta.value=txt;
    ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
    miniToast("Enlace copiado");
  }catch(e){ miniToast("Copia el enlace manualmente"); }
}

// ================= MQTT =================
function topics(room){ return { presence: TOPIC_ROOT + "/" + room + "/p/", events: TOPIC_ROOT + "/" + room + "/e" }; }
function connect(room, onReady){
  if(typeof mqtt === "undefined"){ console.warn("MQTT no disponible"); return; }
  const t = topics(room);
  const willTopic = t.presence + S.cid;
  const url = S.usedFallback ? BROKER_FALLBACK : BROKER;
  let client;
  try{ client = mqtt.connect(url, {
    clientId: "juego_" + S.cid, clean: true, reconnectPeriod: 2500,
    connectTimeout: 8000, keepalive: 30,
    will: { topic: willTopic, payload: "", qos:0, retain:true }
  }); }catch(e){ console.warn("MQTT connect falló", e); return; }
  S.client = client;
  let firstConnect = true;
  client.on("connect", ()=>{
    S.connected = true;
    client.subscribe(t.presence + "+", {qos:0});
    client.subscribe(t.events, {qos:0});
    publishPresence();
    if(firstConnect){ firstConnect=false; onReady && onReady(); }
    refreshStatus();
  });
  client.on("reconnect", ()=>{ refreshStatus(); });
  client.on("close", ()=>{ S.connected=false; refreshStatus(); });
  client.on("error", ()=>{
    if(firstConnect && !S.usedFallback){
      S.usedFallback = true;
      try{ client.end(true); }catch(e){}
      connect(room, onReady);
    }
  });
  client.on("message", (topic, payload)=> handleMessage(topic, payload.toString(), t));
}
function publishPresence(){
  if(!S.client || !S.connected) return;
  const t = topics(S.room);
  const data = JSON.stringify({ cid:S.cid, name:S.name, role:S.role, ready:S.ready });
  S.client.publish(t.presence + S.cid, data, {qos:0, retain:true});
}
function sendEvent(obj){
  if(!S.client) return;
  const t = topics(S.room);
  obj.cid = S.cid;
  S.client.publish(t.events, JSON.stringify(obj), {qos:0, retain:false});
}
function clearPresence(){
  if(!S.client) return;
  const t = topics(S.room);
  S.client.publish(t.presence + S.cid, "", {qos:0, retain:true});
}
function handleMessage(topic, msg, t){
  if(topic.startsWith(t.presence)){
    const who = topic.slice(t.presence.length);
    if(who === S.cid) return;
    if(!msg){ if(S.opp.present){ S.opp.present=false; S.opp.ready=false; onOppLeft(); } return; }
    let d; try{ d=JSON.parse(msg); }catch(e){ return; }
    S.opp.name = d.name || "Rival"; S.opp.ready = !!d.ready; S.opp.present = true; S.oppEverPresent = true;
    onPresenceUpdate();
    return;
  }
  if(topic === t.events){
    let e; try{ e=JSON.parse(msg); }catch(err){ return; }
    if(e.cid === S.cid) return;
    onEvent(e);
  }
}

// ================= Presencia / eventos =================
function onPresenceUpdate(){
  if(S.phase === "lobby"){
    if(S.ready && S.opp.present && S.opp.ready){ startPlay(); } else drawLobby();
  } else if(S.phase === "create-wait"){
    if(S.opp.present){ goSecret(); }
  }
  refreshStatus();
}
// El rival desapareció de la red (cambió de app, bloqueó el móvil, señal...).
// NO le sacamos de la partida: mantenemos el estado y solo mostramos "reconectando".
function onOppLeft(){ refreshStatus(); }
function onEvent(e){
  if(e.t === "guess"){
    const hits = exactHits(e.value, S.secret);
    const win = hits === 4;
    sendEvent({ t:"result", value:e.value, hits, win });
    S.oppLastGuess = { value:e.value, hits };
    if(hits>0) alertHit(hits, win);
    showWarn(hits, S.opp.name || "Tu rival", win);
    if(win){ endGame(false); }
    else { S.myTurn = true; if(S.phase==="play") drawPlay(); }
  }
  else if(e.t === "result"){
    S.waitingResult = false;
    S.guesses.push({ guess:e.value, hits:e.hits });
    if(e.win){ endGame(true); }
    else { S.myTurn = false; if(S.phase==="play") drawPlay(); }
  }
  else if(e.t === "rematch"){
    if(S.phase==="end"){ doRematch(true); }
  }
}

// ================= Iconos (SVG propios) =================
function ICON(name, size, color){
  size = size || 24; color = color || "currentColor";
  const head = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex:none"`;
  const P = {
    dice:`<rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8" cy="8" r="1.35" fill="${color}" stroke="none"/><circle cx="16" cy="8" r="1.35" fill="${color}" stroke="none"/><circle cx="12" cy="12" r="1.35" fill="${color}" stroke="none"/><circle cx="8" cy="16" r="1.35" fill="${color}" stroke="none"/><circle cx="16" cy="16" r="1.35" fill="${color}" stroke="none"/>`,
    key:`<circle cx="8" cy="15" r="4"/><path d="M10.9 12.1 20 3M15.5 4.5l3 3M13.5 6.5l2.5 2.5"/>`,
    hourglass:`<path d="M6 3h12M6 21h12"/><path d="M7.5 3c0 4.5 9 6 9 0M7.5 21c0-4.5 9-6 9 0"/>`,
    signal:`<circle cx="12" cy="12" r="2" fill="${color}" stroke="none"/><path d="M7.6 7.6a6 6 0 000 8.8M16.4 7.6a6 6 0 010 8.8M4.8 4.8a10 10 0 000 14.4M19.2 4.8a10 10 0 010 14.4"/>`,
    clock:`<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/>`,
    warning:`<path d="M12 3.6 21.4 20H2.6z"/><path d="M12 10v4.2M12 17.4h.01"/>`,
    trophy:`<path d="M7 4h10v3.2a5 5 0 01-10 0z"/><path d="M7 5H4v1.2a3 3 0 003 3M17 5h3v1.2a3 3 0 01-3 3"/><path d="M12 12.2v3.8M8.5 20h7M9.6 16h4.8"/>`,
    unlock:`<rect x="4.5" y="11" width="15" height="9.5" rx="2"/><path d="M8 11V7a4 4 0 017.7-1.6"/><circle cx="12" cy="15.6" r="1.4" fill="${color}" stroke="none"/>`,
    lock:`<rect x="4.5" y="11" width="15" height="9.5" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/><circle cx="12" cy="15.6" r="1.4" fill="${color}" stroke="none"/>`,
    shield:`<path d="M12 3l7.5 3v5c0 5.2-3.3 7.4-7.5 8.4C7.8 18.4 4.5 16.2 4.5 11V6z"/><path d="M8.8 12l2.2 2.2 4.4-4.6"/>`,
    target:`<circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3.2"/><path d="M12 1.5v3M12 19.5v3M1.5 12h3M19.5 12h3"/>`,
    check:`<path d="M4 12.5l5 5L20 6"/>`,
    back:`<path d="M9 5h9a2 2 0 012 2v10a2 2 0 01-2 2H9l-6-7z"/><path d="M13 9.5l4 4M17 9.5l-4 4"/>`,
    share:`<circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="M8.3 10.8l7.4-4.3M8.3 13.2l7.4 4.3"/>`,
    link:`<path d="M9 15l6-6"/><path d="M10.5 6.5l1.2-1.2a4 4 0 015.7 5.7l-2.2 2.2"/><path d="M13.5 17.5l-1.2 1.2a4 4 0 01-5.7-5.7l2.2-2.2"/>`
  };
  return `<svg ${head}>${P[name]||""}</svg>`;
}
function iconLabel(name, text){
  return `<span style="display:inline-flex;align-items:center;gap:10px;justify-content:center">${ICON(name,22)}<span>${text}</span></span>`;
}

// ================= Utilidades UI =================
function digitsRow(value, secret){
  let html='<div class="digits">';
  for(let i=0;i<4;i++){
    const has=i<value.length; let cls="digit";
    if(has) cls+=" filled";
    if(i===value.length) cls+=" active";
    let ch = has ? (secret ? "•" : value[i]) : "";
    html+=`<div class="${cls}${secret?' secret':''}">${ch}</div>`;
  }
  return html+'</div>';
}
function keypad(){
  let h='<div class="keypad">';
  for(let n=1;n<=9;n++) h+=`<button class="key" data-n="${n}">${n}</button>`;
  h+=`<button class="key del" data-act="del">${ICON('back',24)}</button>`;
  h+=`<button class="key" data-n="0">0</button>`;
  h+=`<button class="key ok" data-act="ok">${ICON('check',24)}</button>`;
  return h+'</div>';
}
function statusText(){
  if(!S.connected) return { cls:"wait", txt:"Reconectando…" };
  if(S.opp.present) return { cls:"on", txt:"Conectado con "+(S.opp.name||"rival") };
  if(S.oppEverPresent) return { cls:"wait", txt:"Reconectando con "+(S.opp.name||"tu rival")+"…" };
  return { cls:"wait", txt:"Conectado — esperando rival" };
}
function statusBar(){
  const s = statusText();
  return `<div class="status"><span class="dot ${s.cls}"></span><span id="stxt">${s.txt}</span></div>`;
}
function refreshStatus(){
  const el = document.getElementById("stxt");
  if(!el) return;
  const dot = el.parentElement.querySelector(".dot");
  const s = statusText();
  dot.className = "dot "+s.cls; el.textContent = s.txt;
}
function render(html){
  screen.classList.remove("fade"); void screen.offsetWidth;
  screen.innerHTML = html; screen.classList.add("fade");
}
// Actualiza SOLO las casillas de dígitos, sin repintar (ni reanimar) toda la pantalla.
// Esto evita el parpadeo al teclear.
function paintDigits(){
  const cur = screen.querySelector(".digits");
  if(!cur) return;
  const tmp = document.createElement("div");
  tmp.innerHTML = digitsRow(S.buffer);
  cur.replaceWith(tmp.firstElementChild);
  const msg = document.getElementById("msg");
  if(msg) msg.textContent = "";
}
function bindKeypad(redraw, onOk){
  screen.querySelectorAll(".key").forEach(k=>{
    k.onclick = ()=>{
      const act=k.dataset.act;
      if(act==="del"){ S.buffer=S.buffer.slice(0,-1); redraw(); }
      else if(act==="ok"){ onOk(); }
      else if(S.buffer.length<4){ S.buffer+=k.dataset.n; redraw(); }
    };
  });
}

// ================= Pantallas =================
// Animación del título: las 7 casillas giran como dígitos y se bloquean
// una a una (de izquierda a derecha) hasta formar CÓDIGOS.
function animateTitle(){
  const el = document.getElementById("title");
  if(!el) return;
  const target = ["C","Ó","D","I","G","O","S"];
  const emStart = 2; // a partir de aquí, color magenta (como el "DIGOS")
  el.innerHTML = target.map((c,i)=>`<span class="ch num${i>=emStart?' isem':''}">0</span>`).join("");
  const spans = [...el.querySelectorAll(".ch")];
  const locked = new Array(target.length).fill(false);
  const scr = setInterval(()=>{
    for(let i=0;i<spans.length;i++){ if(!locked[i]) spans[i].textContent = String((Math.random()*10)|0); }
  }, 55);
  const base = 300, step = 155;
  target.forEach((c,i)=>{
    setTimeout(()=>{
      locked[i] = true;
      spans[i].textContent = c;
      spans[i].classList.remove("num");
      spans[i].classList.add("lock","pop");
      setTimeout(()=>spans[i].classList.remove("pop"), 230);
      if(i === target.length-1){
        clearInterval(scr);
        // Al terminar, texto normal → kerning nativo de la fuente (adiós casillas de ancho fijo)
        setTimeout(()=>{ el.innerHTML = 'CÓ<span class="em">DIGOS</span>'; }, 250);
      }
    }, base + i*step);
  });
}
function showWelcome(){
  S.phase="welcome";
  const inviteBanner = INVITE ? `<div class="invite">Te han invitado a la sala <b>${INVITE}</b></div>` : "";
  render(`
    <div style="text-align:center;margin-bottom:6px">${ICON('target',48,'#007AFF')}</div>
    <h1 id="title" aria-label="CÓDIGOS"></h1>
    <p class="subtitle">Duelo online · dos jugadores, dos móviles</p>
    ${inviteBanner}
    <div class="rules">
      Cada uno elige en secreto una cifra de <b>4 dígitos sin repetir</b>. Por turnos
      intentáis adivinar la del rival. La única pista: <b>cuántos dígitos acertaste en su
      posición exacta</b>. Cuando aciertas, el <b>móvil del rival suena y destella</b>.
      <b>Gana quien descubra primero la cifra del otro.</b>
    </div>
    <button class="btn green" id="go">${INVITE ? "Entrar a la sala" : "Jugar"}</button>
  `);
  document.getElementById("go").onclick = ()=>{ unlockAudio(); showName(); };
  animateTitle();
}

function showName(){
  S.phase="name";
  render(`
    <h2 class="phase-title">¿Cómo te llamas?</h2>
    <p class="phase-sub">Tu rival verá este nombre.</p>
    <input class="field" id="nm" maxlength="14" placeholder="Tu nombre" value="${S.name}">
    <button class="btn" id="go">Continuar</button>
  `);
  const nm=document.getElementById("nm"); nm.focus();
  document.getElementById("go").onclick=()=>{
    S.name = (nm.value.trim() || "Jugador");
    if(INVITE){ joinRoom(INVITE); } else { showRoom(); }
  };
}

function showRoom(){
  S.phase="room";
  render(`
    <h2 class="phase-title">Sala de juego</h2>
    <p class="phase-sub">Crea una sala e invita a tu rival, o únete con un código.</p>
    <button class="btn gold" id="create">${iconLabel('dice','Crear una sala')}</button>
    <button class="btn secondary" id="join">${iconLabel('key','Unirme con un código')}</button>
  `);
  document.getElementById("create").onclick=()=>{ unlockAudio(); createRoom(); };
  document.getElementById("join").onclick=()=>{ unlockAudio(); joinScreen(); };
}

function createRoom(){
  S.role="host"; S.room=randCode(); S.ready=false; S.opp={name:null,ready:false,present:false};
  S.phase="create-wait";
  drawCreateWait();
  connect(S.room, ()=>{ refreshStatus(); });
}
function drawCreateWait(){
  const url = inviteUrl(S.room);
  render(`
    <h2 class="phase-title">¡Sala creada!</h2>
    <p class="phase-sub">Invita a tu rival — no tendrá que escribir el código.</p>
    <div class="codebox"><div class="lab">Código de sala</div><div class="code">${S.room}</div></div>
    <button class="btn green" id="share">${iconLabel('share','Enviar invitación')}</button>
    <button class="btn secondary" id="copy">${iconLabel('link','Copiar enlace')}</button>
    <p class="hint">O dile el código <b>${S.room}</b> para que lo escriba a mano.</p>
    ${statusBar()}
    <button class="btn secondary" id="cancel">Salir</button>
  `);
  document.getElementById("share").onclick=()=>shareInvite(S.room);
  document.getElementById("copy").onclick=()=>copyText(url);
  document.getElementById("cancel").onclick=leaveToMenu;
  refreshStatus();
}

function joinScreen(){
  S.phase="join";
  render(`
    <h2 class="phase-title">Unirse a una sala</h2>
    <p class="phase-sub">Escribe el código que te pasó tu rival.</p>
    <input class="field code" id="cd" maxlength="4" placeholder="----" autocapitalize="characters" autocomplete="off">
    <p class="msg" id="msg"></p>
    <button class="btn green" id="go">Entrar</button>
    <button class="btn secondary" id="back">Atrás</button>
  `);
  const cd=document.getElementById("cd"); cd.focus();
  cd.addEventListener("input",()=>{ cd.value=cd.value.toUpperCase().replace(/[^A-Z0-9]/g,""); });
  document.getElementById("go").onclick=()=>{
    const code=cd.value.trim().toUpperCase();
    if(code.length<4){ document.getElementById("msg").textContent="El código tiene 4 caracteres."; return; }
    joinRoom(code);
  };
  document.getElementById("back").onclick=showRoom;
}

function joinRoom(code){
  S.role="guest"; S.room=code; S.ready=false; S.opp={name:null,ready:false,present:false};
  goSecret();                 // mostrar la pantalla primero (no depender de la red)
  connect(S.room, ()=>{});
}

function goSecret(){ S.phase="secret"; S.buffer=""; drawSecret(); }
function drawSecret(){
  render(`
    <h2 class="phase-title">Tu cifra secreta</h2>
    <p class="phase-sub">Elige 4 dígitos <b>sin repetir</b>. El rival no la verá.</p>
    ${digitsRow(S.buffer)}
    <p class="msg" id="msg"></p>
    ${keypad()}
    ${statusBar()}
  `);
  refreshStatus();
  bindKeypad(paintDigits, submitSecret);
}
function submitSecret(){
  const msg=document.getElementById("msg");
  if(S.buffer.length<4){ msg.textContent="Faltan dígitos."; return; }
  if(!isValid(S.buffer)){ msg.textContent="Los 4 dígitos deben ser distintos."; return; }
  S.secret=S.buffer; S.buffer=""; S.ready=true;
  publishPresence();
  S.phase="lobby";
  drawLobby();
  onPresenceUpdate();
}
function drawLobby(){
  const oppTxt = S.opp.present
    ? (S.opp.ready ? `${S.opp.name} está listo ${ICON('check',16,'#34c759')}` : `${S.opp.name} está eligiendo su cifra…`)
    : `Esperando a que tu rival entre y elija su cifra…`;
  render(`
    <div class="handoff">
      <div class="icon">${ICON('hourglass',52,'#007AFF')}</div>
      <div class="phase-title">¡Listo!</div>
      <p class="phase-sub">Tu cifra está guardada.<br>${oppTxt}</p>
    </div>
    ${statusBar()}
    <button class="btn secondary" id="cancel">Salir</button>
  `);
  refreshStatus();
  document.getElementById("cancel").onclick=leaveToMenu;
}

function startPlay(){
  S.phase="play"; S.buffer="";
  S.myTurn = (S.role==="host");
  drawPlay();
}
function drawPlay(){
  const hist = S.guesses;
  let historyHtml = hist.length===0
    ? `<div class="empty">Aún no has hecho intentos.</div>`
    : hist.slice().reverse().map(h=>`
        <div class="hrow">
          <span class="g">${h.guess}</span>
          <span class="hits">aciertos <span class="pill ${h.hits===4?'win':(h.hits===0?'zero':'')}">${h.hits}/4</span></span>
        </div>`).join("");

  let center;
  if(S.myTurn){
    center = `
      <p class="phase-sub" style="margin-bottom:4px">Intento #${hist.length+1} — adivina la cifra de <b>${S.opp.name||"tu rival"}</b></p>
      ${digitsRow(S.buffer)}
      <p class="msg" id="msg"></p>
      ${keypad()}`;
  } else if(S.waitingResult){
    center = `<div class="handoff"><div class="icon">${ICON('signal',52,'#007AFF')}</div><p class="phase-sub">Enviando tu intento…</p></div>`;
  } else {
    const last = S.oppLastGuess
      ? `<div class="lasthit">Su último intento acertó <b>${S.oppLastGuess.hits}/4</b> de tus dígitos</div>`
      : "";
    center = `<div class="handoff"><div class="icon">${ICON('clock',52,'#8e8e93')}</div><p class="phase-sub">Turno de <b>${S.opp.name||"tu rival"}</b>.<br>Está intentando adivinar tu cifra…</p>${last}</div>`;
  }

  render(`
    <div class="turnbar">
      <span class="name">${S.name}</span>
      <span class="badge ${S.myTurn?'you':'wait'}">${S.myTurn?'TU TURNO':'ESPERA'}</span>
    </div>
    ${center}
    <div class="history">
      <h3>Tus intentos (${hist.length})</h3>
      ${historyHtml}
    </div>
    ${statusBar()}
  `);
  refreshStatus();
  if(S.myTurn) bindKeypad(paintDigits, submitGuess);
}
function submitGuess(){
  const msg=document.getElementById("msg");
  if(S.buffer.length<4){ msg.textContent="Faltan dígitos."; return; }
  if(!isValid(S.buffer)){ msg.textContent="Los 4 dígitos deben ser distintos."; return; }
  const value=S.buffer; S.buffer="";
  S.waitingResult=true; S.myTurn=false;
  sendEvent({ t:"guess", value });
  drawPlay();
}

function endGame(won){ S.phase="end"; S.won=won; drawEnd(); }
function drawEnd(){
  const won=S.won;
  render(`
    <div class="end">
      <div class="emoji">${won?ICON('trophy',64,'#34c759'):ICON('unlock',64,'#ff3b30')}</div>
      <div class="big ${won?'win':'lose'}">${won?"¡Ganaste!":"Te descubrieron"}</div>
      <p class="phase-sub">${won
        ? `Adivinaste la cifra de ${S.opp.name||"tu rival"} en ${S.guesses.length} ${S.guesses.length===1?'intento':'intentos'}.`
        : `${S.opp.name||"Tu rival"} descubrió tu cifra primero.`}</p>
      <div class="reveal">Tu cifra era: <b>${S.secret}</b></div>
      <button class="btn gold" id="again">Revancha</button>
      <button class="btn secondary" id="menu">Salir</button>
    </div>
    ${statusBar()}
  `);
  refreshStatus();
  document.getElementById("again").onclick=()=>{ sendEvent({t:"rematch"}); doRematch(false); };
  document.getElementById("menu").onclick=leaveToMenu;
}
function doRematch(fromOpponent){
  S.secret=null; S.buffer=""; S.guesses=[]; S.ready=false; S.won=false;
  S.waitingResult=false; S.myTurn=false; S.oppLastGuess=null;
  S.opp.ready=false;
  publishPresence();
  goSecret();
}

function showInfo(title, sub){
  render(`
    <div class="handoff">
      <div class="icon">${ICON('warning',52,'#ff9f0a')}</div>
      <div class="phase-title">${title}</div>
      <p class="phase-sub">${sub}</p>
    </div>
    ${statusBar()}
    <button class="btn secondary" id="menu">Salir al menú</button>
  `);
  refreshStatus();
  document.getElementById("menu").onclick=leaveToMenu;
}

function leaveToMenu(){
  try{ clearPresence(); }catch(e){}
  try{ if(S.client) S.client.end(true); }catch(e){}
  S.client=null; S.connected=false; S.role=null; S.room=null; S.secret=null;
  S.buffer=""; S.guesses=[]; S.ready=false; S.opp={name:null,ready:false,present:false};
  S.waitingResult=false; S.myTurn=false; S.oppLastGuess=null;
  showRoom();
}

// Al volver a la app / desbloquear el móvil: reconectar sin perder la partida.
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "visible" && S.client){
    try{ if(audioCtx && audioCtx.state === "suspended") audioCtx.resume(); }catch(e){}
    if(!S.connected){ try{ S.client.reconnect(); }catch(e){} }
    else { publishPresence(); }  // reafirmar presencia por si el rival nos dio por caídos
    refreshStatus();
  }
});
window.addEventListener("pageshow", (e)=>{
  if(e.persisted && S.client && !S.connected){ try{ S.client.reconnect(); }catch(err){} }
});

document.addEventListener("keydown",(e)=>{
  if(S.phase!=="secret" && !(S.phase==="play" && S.myTurn)) return;
  if(/^[0-9]$/.test(e.key)){ if(S.buffer.length<4){ S.buffer+=e.key; paintDigits(); } }
  else if(e.key==="Backspace"){ S.buffer=S.buffer.slice(0,-1); paintDigits(); }
  else if(e.key==="Enter"){ S.phase==="secret"?submitSecret():submitGuess(); }
});

showWelcome();
</script>
